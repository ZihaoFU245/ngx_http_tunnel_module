worker_processes auto;

events {
    worker_connections 1024;
}

http {
    tcp_nodelay on;
    server_tokens off;

    resolver 1.1.1.1 8.8.8.8;

    map $connect_target_host $is_granted {
        default 1;
    }

    server {
        listen 0.0.0.0:443 ssl;
        server_name CHANGE_ME;

        http2 on;

        ssl_certificate  CHANGE_ME.crt;
        ssl_certificate_key  CHANGE_ME.key;

        tunnel_connect;
        # tunnel_connect_tcp_nodelay on;

        # nginx 1.30.x and older: proxy auth is handled by this module.
        tunnel_connect_proxy_auth_user_file /etc/nginx/htaccess;

        # off: auth failures return 407 with Proxy-Authenticate.
        # on: auth failures look like normal method rejection, 405.
        tunnel_connect_probe_resistance on;
        tunnel_connect_probe_resistance_allow_methods "";

        tunnel_connect_acl_eval_on $is_granted;

        tunnel_connect_buffer_size 64k;
        tunnel_connect_upstream_timeout 60s;
        tunnel_connect_idle_timeout 30s;

        location / {
            proxy_pass http://localhost:8080;
        }
    }

    server {
        listen 127.0.0.1:8080;

        location / {
            return 200 "Hello, World!\n";
        }
    }
}
