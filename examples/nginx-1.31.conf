worker_processes auto;

events {
    worker_connections 1024;
}

http {
    tcp_nodelay on;
    server_tokens off;

    resolver 1.1.1.1 8.8.8.8;

    map $connect_target_host $is_granted {
        default 1;
    }

    map $request_method $connect_auth_realm {
        default off;
        CONNECT proxy;
    }

    server {
        listen 0.0.0.0:443 ssl;
        server_name CHANGE_ME;

        http2 on;

        ssl_certificate  CHANGE_ME.crt;
        ssl_private_key  CHANGE_ME.key;

        # nginx 1.31.0 and newer: proxy auth is handled by nginx core.
        auth_basic $connect_auth_realm;
        auth_basic_user_file /etc/nginx/htpasswd;

        # Optional probe resistance for auth failures.
        # Enable this if 407 responses should be disguised as 405.
        error_page 407 =405 @probe_resistance;

        location @probe_resistance {
            internal;
            # add_header Allow "GET, POST, OPTIONS" always;
            return 405;
        }

        tunnel_pass;

        # Do not use tunnel_proxy_auth_user_file or tunnel_probe_resistance
        # on nginx 1.31.0 and newer.
        tunnel_acl_eval_on $is_granted;

        tunnel_buffer_size 128k;
        tunnel_connect_timeout 60s;
        tunnel_idle_timeout 30s;

        location / {
            proxy_pass http://localhost:8080;
        }
    }

    server {
        listen 127.0.0.1:8080;

        location / {
            return 200 "Hello, World!\n";
        }
    }
}
